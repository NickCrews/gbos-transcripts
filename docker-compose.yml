services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    environment:
      POSTGRES_DB: gbos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gbos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
